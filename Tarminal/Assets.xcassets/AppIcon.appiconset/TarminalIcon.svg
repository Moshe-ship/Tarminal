<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff66"/>
      <stop offset="100%" stop-color="#00cc44"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- macOS rounded rect (squircle approximation) -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect x="20" y="20" width="984" height="984" rx="220" ry="220"
        fill="none" stroke="#00ff66" stroke-opacity="0.15" stroke-width="3"/>

  <!-- Terminal prompt cursor (blinking block) -->
  <rect x="160" y="680" width="48" height="64" rx="4" fill="#00ff66" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Prompt chevron > -->
  <text x="130" y="735" font-family="SF Mono, Menlo, monospace" font-size="72"
        fill="#00ff66" opacity="0.4" text-anchor="end">&gt;</text>

  <!-- Scanlines (subtle terminal effect) -->
  <g opacity="0.03">
    <line x1="60" y1="100" x2="964" y2="100" stroke="white" stroke-width="1"/>
    <line x1="60" y1="140" x2="964" y2="140" stroke="white" stroke-width="1"/>
    <line x1="60" y1="180" x2="964" y2="180" stroke="white" stroke-width="1"/>
    <line x1="60" y1="220" x2="964" y2="220" stroke="white" stroke-width="1"/>
    <line x1="60" y1="260" x2="964" y2="260" stroke="white" stroke-width="1"/>
    <line x1="60" y1="300" x2="964" y2="300" stroke="white" stroke-width="1"/>
    <line x1="60" y1="340" x2="964" y2="340" stroke="white" stroke-width="1"/>
    <line x1="60" y1="380" x2="964" y2="380" stroke="white" stroke-width="1"/>
    <line x1="60" y1="420" x2="964" y2="420" stroke="white" stroke-width="1"/>
    <line x1="60" y1="460" x2="964" y2="460" stroke="white" stroke-width="1"/>
    <line x1="60" y1="500" x2="964" y2="500" stroke="white" stroke-width="1"/>
    <line x1="60" y1="540" x2="964" y2="540" stroke="white" stroke-width="1"/>
    <line x1="60" y1="580" x2="964" y2="580" stroke="white" stroke-width="1"/>
    <line x1="60" y1="620" x2="964" y2="620" stroke="white" stroke-width="1"/>
    <line x1="60" y1="660" x2="964" y2="660" stroke="white" stroke-width="1"/>
    <line x1="60" y1="700" x2="964" y2="700" stroke="white" stroke-width="1"/>
    <line x1="60" y1="740" x2="964" y2="740" stroke="white" stroke-width="1"/>
    <line x1="60" y1="780" x2="964" y2="780" stroke="white" stroke-width="1"/>
    <line x1="60" y1="820" x2="964" y2="820" stroke="white" stroke-width="1"/>
    <line x1="60" y1="860" x2="964" y2="860" stroke="white" stroke-width="1"/>
    <line x1="60" y1="900" x2="964" y2="900" stroke="white" stroke-width="1"/>
  </g>

  <!-- The Arabic letter ت (ta) — large, centered, terminal green with glow -->
  <text x="512" y="540" text-anchor="middle" dominant-baseline="central"
        font-family="Geeza Pro, Baghdad, SF Arabic, Arial" font-size="480" font-weight="bold"
        fill="url(#glowGrad)" filter="url(#outerGlow)">ت</text>

  <!-- Subtle reflection/sheen on the letter -->
  <text x="512" y="540" text-anchor="middle" dominant-baseline="central"
        font-family="Geeza Pro, Baghdad, SF Arabic, Arial" font-size="480" font-weight="bold"
        fill="white" opacity="0.08">ت</text>
</svg>
